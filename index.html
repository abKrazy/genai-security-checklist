<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GuardRails — GenAI Security &amp; Governance Checklist</title>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#21262d;--border:#30363d;
  --text:#e6edf3;--text-muted:#8b949e;--accent:#58a6ff;--accent2:#1f6feb;
  --azure:#0078d4;--azure-light:#50e6ff;--purple:#773adc;
  --high:#f85149;--medium:#d29922;--low:#3fb950;
  --radius:8px;--transition:0.2s ease;
}
html{font-size:15px;scroll-behavior:smooth}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;line-height:1.5}

/* Header */
.header{position:sticky;top:0;z-index:100;background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);border-bottom:1px solid var(--border);padding:0.8rem 1.5rem;backdrop-filter:blur(12px)}
.header-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
.logo{display:flex;align-items:center;gap:0.6rem}
.logo svg{width:32px;height:32px}
.logo h1{font-size:1.4rem;background:linear-gradient(135deg,var(--azure-light),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:700}
.logo .tagline{font-size:0.75rem;color:var(--text-muted);display:block;margin-top:-2px}

/* Score */
.score-section{display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.score-circle{width:70px;height:70px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:700;background:conic-gradient(var(--high) 0%,var(--high) var(--score-pct,0%),var(--surface2) var(--score-pct,0%));position:relative}
.score-circle::after{content:'';position:absolute;inset:6px;border-radius:50%;background:var(--bg)}
.score-number{position:relative;z-index:1}
.score-label{font-size:0.7rem;color:var(--text-muted);text-align:center}
.score-bar{width:200px;height:8px;background:var(--surface2);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width 0.4s ease,background 0.4s ease;width:0%}
.score-details{font-size:0.75rem;color:var(--text-muted)}

/* Actions */
.actions{display:flex;gap:0.5rem;flex-wrap:wrap}
.btn{padding:0.5rem 1rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:0.8rem;transition:var(--transition);display:flex;align-items:center;gap:0.4rem;text-decoration:none}
.btn:hover{background:var(--surface2);border-color:var(--accent)}
.btn-primary{background:var(--azure);border-color:var(--azure);color:#fff}
.btn-primary:hover{background:var(--accent2)}

/* Search */
.search-section{max-width:1400px;margin:1rem auto;padding:0 1.5rem}
.search-bar{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center}
.search-input{flex:1;min-width:200px;padding:0.6rem 1rem;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:0.9rem;outline:none;transition:var(--transition)}
.search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(88,166,255,0.15)}
.search-input::placeholder{color:var(--text-muted)}
.filter-pills{display:flex;gap:0.3rem;flex-wrap:wrap}
.filter-pill{padding:0.3rem 0.7rem;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text-muted);cursor:pointer;font-size:0.75rem;transition:var(--transition)}
.filter-pill:hover,.filter-pill.active{border-color:var(--accent);color:var(--accent);background:rgba(88,166,255,0.1)}
.stats-bar{display:flex;gap:1.5rem;flex-wrap:wrap;margin-top:0.5rem;font-size:0.75rem;color:var(--text-muted)}

/* Main */
.main{max-width:1400px;margin:0 auto;padding:0 1.5rem 3rem}

/* Category */
.category{margin-top:1.2rem;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;background:var(--surface)}
.category-header{padding:0.8rem 1rem;cursor:pointer;display:flex;align-items:center;justify-content:space-between;background:var(--surface);transition:var(--transition);gap:0.5rem;user-select:none}
.category-header:hover{background:var(--surface2)}
.category-title{display:flex;align-items:center;gap:0.6rem;font-weight:600;font-size:1rem}
.category-icon{font-size:1.2rem}
.category-meta{display:flex;align-items:center;gap:0.8rem}
.category-progress{font-size:0.75rem;color:var(--text-muted)}
.category-bar{width:80px;height:4px;background:var(--surface2);border-radius:2px;overflow:hidden}
.category-bar-fill{height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s ease}
.chevron{font-size:0.8rem;transition:transform 0.2s ease;color:var(--text-muted)}
.category.open .chevron{transform:rotate(180deg)}
.category-actions{display:flex;gap:0.3rem}
.cat-btn{padding:0.2rem 0.5rem;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-muted);cursor:pointer;font-size:0.65rem;transition:var(--transition)}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Controls */
.controls-list{display:none;border-top:1px solid var(--border)}
.category.open .controls-list{display:block}
.control-item{display:grid;grid-template-columns:auto 1fr;gap:0.8rem;padding:0.7rem 1rem;border-bottom:1px solid var(--border);transition:var(--transition);align-items:start}
.control-item:last-child{border-bottom:none}
.control-item:hover{background:rgba(88,166,255,0.03)}
.control-item.checked{background:rgba(63,185,80,0.05)}

/* Checkbox */
.check{width:20px;height:20px;border-radius:4px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--transition);flex-shrink:0;margin-top:2px}
.check:hover{border-color:var(--accent)}
.check.checked{background:var(--low);border-color:var(--low)}
.check.checked::after{content:'✓';color:#fff;font-size:0.75rem;font-weight:700}
.check:focus-visible{outline:2px solid var(--accent);outline-offset:2px}

/* Control details */
.control-details{display:flex;flex-direction:column;gap:0.3rem;min-width:0}
.control-top{display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap}
.control-name{font-weight:600;font-size:0.9rem}
.control-item.checked .control-name{text-decoration:line-through;opacity:0.6}
.control-desc{font-size:0.8rem;color:var(--text-muted);line-height:1.4}
.control-bottom{display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;margin-top:0.2rem}

/* Badges */
.badge{padding:0.15rem 0.5rem;border-radius:12px;font-size:0.65rem;font-weight:600;white-space:nowrap}
.badge-product{background:rgba(88,166,255,0.15);color:var(--accent);border:1px solid rgba(88,166,255,0.25)}
.badge-high{background:rgba(248,81,73,0.15);color:var(--high);border:1px solid rgba(248,81,73,0.25)}
.badge-medium{background:rgba(210,153,34,0.15);color:var(--medium);border:1px solid rgba(210,153,34,0.25)}
.badge-low{background:rgba(63,185,80,0.15);color:var(--low);border:1px solid rgba(63,185,80,0.25)}
.badge-stakeholder{background:rgba(119,58,220,0.12);color:#b87dff;border:1px solid rgba(119,58,220,0.2);font-weight:400}
.ref-link{font-size:0.7rem;color:var(--accent);text-decoration:none;transition:var(--transition);white-space:nowrap;display:inline-flex;align-items:center;gap:0.2rem}
.ref-link:hover{text-decoration:underline;color:var(--azure-light)}
.ref-link svg{width:10px;height:10px}

/* Footer */
.footer{text-align:center;padding:2rem 1rem;color:var(--text-muted);font-size:0.75rem;border-top:1px solid var(--border);margin-top:2rem}

/* Responsive */
@media(max-width:768px){
  .header-inner{flex-direction:column;align-items:flex-start}
  .score-section{width:100%;justify-content:space-between}
  .score-bar{width:120px}
  .actions{width:100%}
  .control-item{grid-template-columns:auto 1fr}
  .control-top{flex-direction:column;align-items:flex-start}
  .category-meta{flex-wrap:wrap}
  .search-bar{flex-direction:column}
  .search-input{min-width:100%}
}
@media(max-width:480px){
  html{font-size:14px}
  .header{padding:0.6rem 1rem}
  .main{padding:0 1rem 2rem}
  .search-section{padding:0 1rem}
  .score-circle{width:55px;height:55px;font-size:1rem}
  .control-item{padding:0.6rem 0.7rem}
}

/* Print / PDF */
@media print{
  .header{position:relative}
  .btn,.search-section{display:none!important}
  .category.open .controls-list,.controls-list{display:block!important}
  .control-item{break-inside:avoid}
}

/* Animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.category{animation:fadeIn 0.3s ease forwards}
</style>
</head>

const CATEGORY_ICONS={"Azure AI Content Safety":"🛡️","Microsoft Purview":"🔍","Microsoft Entra ID":"🔐","Network Security":"🌐","AI Gateway (Azure API Management)":"🚪","Azure AI Foundry":"🏭","Microsoft 365 Copilot & Agents":"💼","Microsoft Defender for Cloud":"🛡️","AI Evaluations":"📊","Red Teaming":"🔴","Key Management":"🔑","Monitoring & Observability":"📈","Responsible AI & Governance":"⚖️"};

const WEIGHT={High:3,Medium:2,Low:1};
let checkedState={};

// Load state from localStorage
try{const s=localStorage.getItem('guardrails-state');if(s)checkedState=JSON.parse(s);}catch(e){}

function saveState(){try{localStorage.setItem('guardrails-state',JSON.stringify(checkedState));}catch(e){}}

function getCategories(){
  const cats=new Map();
  CHECKLIST_DATA.forEach((item,i)=>{
    if(!cats.has(item.category))cats.set(item.category,[]);
    cats.get(item.category).push({...item,index:i});
  });
  return cats;
}

function calcScore(){
  let checked=0,total=0,checkedCount=0;
  CHECKLIST_DATA.forEach((item,i)=>{
    const w=WEIGHT[item.priority]||1;
    total+=w;
    if(checkedState[i]){checked+=w;checkedCount++;}
  });
  const score=total>0?Math.round((checked/total)*100):0;
  return{score,checkedCount,total:CHECKLIST_DATA.length,checked,totalWeight:total};
}

function getScoreColor(score){
  if(score<34)return'var(--high)';
  if(score<67)return'var(--medium)';
  return'var(--low)';
}

function updateScore(){
  const{score,checkedCount}=calcScore();
  const color=getScoreColor(score);
  document.getElementById('scoreNumber').textContent=score;
  document.getElementById('scoreCircle').style.setProperty('--score-pct',score+'%');
  document.getElementById('scoreCircle').style.background=`conic-gradient(${color} 0%,${color} ${score}%,var(--surface2) ${score}%)`;
  const bar=document.getElementById('scoreBar');
  bar.style.width=score+'%';
  bar.style.background=color;
  document.getElementById('scoreDetails').textContent=`${checkedCount} of ${CHECKLIST_DATA.length} controls implemented`;
  updateCategoryBars();
  updateStats();
}

function updateCategoryBars(){
  const cats=getCategories();
  cats.forEach((items,catName)=>{
    const el=document.querySelector(`[data-cat="${CSS.escape(catName)}"] .category-bar-fill`);
    const prog=document.querySelector(`[data-cat="${CSS.escape(catName)}"] .category-progress`);
    if(!el)return;
    const total=items.length;
    const done=items.filter(it=>checkedState[it.index]).length;
    const pct=Math.round((done/total)*100);
    el.style.width=pct+'%';
    if(prog)prog.textContent=`${done}/${total}`;
  });
}

function updateStats(){
  const{score,checkedCount}=calcScore();
  const high=CHECKLIST_DATA.filter((d,i)=>d.priority==='High'&&checkedState[i]).length;
  const highTotal=CHECKLIST_DATA.filter(d=>d.priority==='High').length;
  const med=CHECKLIST_DATA.filter((d,i)=>d.priority==='Medium'&&checkedState[i]).length;
  const medTotal=CHECKLIST_DATA.filter(d=>d.priority==='Medium').length;
  const low=CHECKLIST_DATA.filter((d,i)=>d.priority==='Low'&&checkedState[i]).length;
  const lowTotal=CHECKLIST_DATA.filter(d=>d.priority==='Low').length;
  document.getElementById('statsBar').innerHTML=
    `<span>Score: <strong>${score}/100</strong></span>`+
    `<span style="color:var(--high)">High: ${high}/${highTotal}</span>`+
    `<span style="color:var(--medium)">Medium: ${med}/${medTotal}</span>`+
    `<span style="color:var(--low)">Low: ${low}/${lowTotal}</span>`+
    `<span>Total: ${checkedCount}/${CHECKLIST_DATA.length}</span>`;
}

function toggleCheck(index){
  checkedState[index]=!checkedState[index];
  const el=document.querySelector(`[data-index="${index}"]`);
  if(el){
    const cb=el.querySelector('.check');
    const item=el;
    if(checkedState[index]){cb.classList.add('checked');item.classList.add('checked');}
    else{cb.classList.remove('checked');item.classList.remove('checked');}
  }
  saveState();
  updateScore();
}

function toggleCategory(catName,check){
  const cats=getCategories();
  const items=cats.get(catName)||[];
  items.forEach(it=>{
    checkedState[it.index]=check;
    const el=document.querySelector(`[data-index="${it.index}"]`);
    if(el){
      const cb=el.querySelector('.check');
      if(check){cb.classList.add('checked');el.classList.add('checked');}
      else{cb.classList.remove('checked');el.classList.remove('checked');}
    }
  });
  saveState();
  updateScore();
}

function render(filter='all',search=''){
  const container=document.getElementById('checklistContainer');
  const cats=getCategories();
  let html='';
  const searchLower=search.toLowerCase();

  cats.forEach((items,catName)=>{
    let filtered=items;
    if(filter!=='all')filtered=filtered.filter(it=>it.priority===filter);
    if(search)filtered=filtered.filter(it=>
      it.control.toLowerCase().includes(searchLower)||
      it.description.toLowerCase().includes(searchLower)||
      it.product.toLowerCase().includes(searchLower)||
      it.category.toLowerCase().includes(searchLower)||
      it.stakeholders.toLowerCase().includes(searchLower)
    );
    if(filtered.length===0)return;

    const icon=CATEGORY_ICONS[catName]||'📋';
    const done=filtered.filter(it=>checkedState[it.index]).length;
    html+=`<div class="category open" data-cat="${catName}">
      <div class="category-header" onclick="this.parentElement.classList.toggle('open')">
        <div class="category-title"><span class="category-icon">${icon}</span>${catName}</div>
        <div class="category-meta">
          <div class="category-actions">
            <button class="cat-btn" onclick="event.stopPropagation();toggleCategory('${catName.replace(/'/g,"\\'")}',true)">Select All</button>
            <button class="cat-btn" onclick="event.stopPropagation();toggleCategory('${catName.replace(/'/g,"\\'")}',false)">Clear</button>
          </div>
          <span class="category-progress">${done}/${filtered.length}</span>
          <div class="category-bar"><div class="category-bar-fill" style="width:${filtered.length?Math.round((done/filtered.length)*100):0}%"></div></div>
          <span class="chevron">▼</span>
        </div>
      </div>
      <div class="controls-list">`;

    filtered.forEach(item=>{
      const isChecked=checkedState[item.index];
      html+=`<div class="control-item${isChecked?' checked':''}" data-index="${item.index}">
        <div class="check${isChecked?' checked':''}" tabindex="0" role="checkbox" aria-checked="${isChecked}" aria-label="${item.control}" onclick="toggleCheck(${item.index})" onkeydown="if(event.key===' '||event.key==='Enter'){event.preventDefault();toggleCheck(${item.index})}"></div>
        <div class="control-details">
          <div class="control-top">
            <span class="control-name">${item.control}</span>
            <span class="badge badge-${item.priority.toLowerCase()}">${item.priority}</span>
          </div>
          <div class="control-desc">${item.description}</div>
          <div class="control-bottom">
            <span class="badge badge-product">${item.product}</span>
            <span class="badge badge-stakeholder">${item.stakeholders}</span>
            <a class="ref-link" href="${item.referenceUrl}" target="_blank" rel="noopener noreferrer">
              Docs <svg viewBox="0 0 16 16" fill="currentColor"><path d="M10 1H14V5M14 1L7 8M12 9V13C12 13.6 11.6 14 11 14H3C2.4 14 2 13.6 2 13V5C2 4.4 2.4 4 3 4H7" stroke="currentColor" stroke-width="1.5" fill="none"/></svg>
            </a>
          </div>
        </div>
      </div>`;
    });
    html+=`</div></div>`;
  });

  if(!html)html='<div style="text-align:center;padding:3rem;color:var(--text-muted)">No controls match your search.</div>';
  container.innerHTML=html;
}

function downloadPDF(){
  const el=document.querySelector('.main');
  // Temporarily open all categories for PDF
  document.querySelectorAll('.category').forEach(c=>c.classList.add('open'));
  const {score,checkedCount,total}=calcScore();
  const opt={
    margin:[10,10,10,10],
    filename:'GuardRails-GenAI-Security-Checklist.pdf',
    image:{type:'jpeg',quality:0.98},
    html2canvas:{scale:2,useCORS:true,backgroundColor:'#0d1117'},
    jsPDF:{unit:'mm',format:'a4',orientation:'portrait'},
    pagebreak:{mode:['avoid-all','css','legacy']}
  };
  const wrapper=document.createElement('div');
  wrapper.style.cssText='background:#0d1117;color:#e6edf3;font-family:Segoe UI,system-ui,sans-serif;padding:0;';
  // Compact PDF header — no clone, avoids blank first page
  const pdfHeader=document.createElement('div');
  pdfHeader.style.cssText='padding:16px 0 12px;border-bottom:2px solid #30363d;margin-bottom:16px;';
  pdfHeader.innerHTML=`<div style="font-size:22px;font-weight:700;background:linear-gradient(135deg,#50E6FF,#0078D4,#773ADC);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">GuardRails</div>`
    +`<div style="font-size:11px;color:#8b949e;margin-top:2px;">GenAI Security &amp; Governance Checklist for Azure Enterprise</div>`
    +`<div style="margin-top:8px;font-size:13px;color:#e6edf3;">Score: <strong>${Math.round(score)}/100</strong> &mdash; ${checkedCount} of ${total} controls implemented</div>`;
  wrapper.appendChild(pdfHeader);
  const mainClone=el.cloneNode(true);
  wrapper.appendChild(mainClone);
  // Remove interactive elements from clone
  wrapper.querySelectorAll('.btn,.cat-btn,.search-section').forEach(b=>b.remove());
  html2pdf().set(opt).from(wrapper).save();
}

function resetAll(){
  checkedState={};
  saveState();
  render(currentFilter,currentSearch);
  updateScore();
}

let currentFilter='all',currentSearch='';

// Filter pills
document.getElementById('filterPills').addEventListener('click',e=>{
  const pill=e.target.closest('.filter-pill');
  if(!pill)return;
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  currentFilter=pill.dataset.filter;
  render(currentFilter,currentSearch);
  updateScore();
});

// Search
document.getElementById('searchInput').addEventListener('input',e=>{
  currentSearch=e.target.value;
  render(currentFilter,currentSearch);
  updateScore();
});

// Init
render();
updateScore();
</script>
</body>
</html>
